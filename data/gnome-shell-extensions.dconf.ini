[appindicator]
icon-brightness=0.0
icon-contrast=0.0
icon-opacity=240
icon-saturation=0.0
icon-size=0

[blur-my-shell]
pipelines={'pipeline_default': {'name': <'Default'>, 'effects': <[<{'type': <'native_static_gaussian_blur'>, 'id': <'effect_000000000000'>, 'params': <{'radius': <30>, 'brightness': <0.59999999999999998>}>}>]>}, 'pipeline_default_rounded': {'name': <'Default rounded'>, 'effects': <[<{'type': <'native_static_gaussian_blur'>, 'id': <'effect_000000000001'>, 'params': <{'radius': <30>, 'brightness': <0.59999999999999998>}>}>, <{'type': <'corner'>, 'id': <'effect_000000000002'>, 'params': <{'radius': <24>}>}>]>}}
settings-version=2

[blur-my-shell/appfolder]
brightness=0.59999999999999998
sigma=30

[blur-my-shell/coverflow-alt-tab]
pipeline='pipeline_default'

[blur-my-shell/dash-to-dock]
blur=true
brightness=0.59999999999999998
pipeline='pipeline_default_rounded'
sigma=30
static-blur=true
style-dash-to-dock=0

[blur-my-shell/lockscreen]
pipeline='pipeline_default'

[blur-my-shell/overview]
pipeline='pipeline_default'

[blur-my-shell/panel]
brightness=0.59999999999999998
pipeline='pipeline_default'
sigma=30

[blur-my-shell/screenshot]
pipeline='pipeline_default'

[blur-my-shell/window-list]
brightness=0.59999999999999998
sigma=30

[clipboard-indicator]
cache-only-favorites=false
cache-size=20
clear-history=@as []
confirm-clear=false
disable-down-arrow=true
enable-keybindings=true
history-size=100
move-item-first=true
next-entry=@as []
next-history-clear=-1
notify-on-copy=false
notify-on-cycle=false
paste-button=false
paste-on-select=true
prev-entry=@as []
preview-size=30
private-mode-binding=@as []
strip-text=true
toggle-menu=['<Super><Ctrl>v']

[dash-to-dock]
always-center-icons=true
animation-time=0.050000000000000017
apply-custom-theme=false
autohide=true
background-opacity=0.80000000000000004
click-action='focus-minimize-or-previews'
custom-theme-shrink=true
dash-max-icon-size=32
disable-overview-on-startup=true
dock-fixed=false
dock-position='BOTTOM'
extend-height=false
height-fraction=0.90000000000000002
hide-delay=0.14999999999999969
hide-tooltip=false
hotkeys-overlay=true
hotkeys-show-dock=true
icon-size-fixed=true
intellihide=false
intellihide-mode='FOCUS_APPLICATION_WINDOWS'
isolate-monitors=false
isolate-workspaces=false
middle-click-action='launch'
multi-monitor=true
preferred-monitor=-2
preferred-monitor-by-connector='eDP-1'
preview-size-scale=0.0
require-pressure-to-show=false
scroll-action='cycle-windows'
scroll-to-focused-application=true
shift-click-action='minimize'
shift-middle-click-action='launch'
shortcut=['<Super>q']
shortcut-text='<Super>q'
shortcut-timeout=2.0
show-apps-always-in-the-edge=false
show-apps-at-top=true
show-delay=0.050000000000000017
show-dock-urgent-notify=false
show-mounts-network=true
show-running=true
show-show-apps-button=true
show-trash=false
show-windows-preview=true

[kimpanel]
font='Noto Sans 11'
vertical=false
